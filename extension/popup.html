<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
      body {
        width: 360px;
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top right, #1a1a1a, #050505);
        color: #fff;
        font-family: 'Space Grotesk', sans-serif;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 20px 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(0, 0, 0, 0.3);
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #C8A97E;
        box-shadow: 0 0 10px rgba(200, 169, 126, 0.3);
      }
      .title-container {
        display: flex;
        flex-direction: column;
      }
      h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 2px;
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
      }
      .subtitle {
        margin: 2px 0 0 0;
        font-size: 11px;
        color: #C8A97E;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .container {
        padding: 25px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        color: #aaa;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      select, textarea {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        border-radius: 8px;
        font-family: inherit;
        box-sizing: border-box;
        font-size: 14px;
        transition: all 0.3s ease;
      }
      select {
        margin-bottom: 20px;
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23C8A97E%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 15px top 50%;
        background-size: 12px auto;
      }
      option {
        background: #111;
        color: #fff;
      }
      textarea {
        height: 120px;
        resize: none;
        margin-bottom: 20px;
      }
      select:focus, textarea:focus {
        outline: none;
        border-color: #C8A97E;
        background: rgba(255, 255, 255, 0.05);
      }
      button {
        width: 100%;
        padding: 15px;
        background: #C8A97E;
        color: #000;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(200, 169, 126, 0.2);
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(200, 169, 126, 0.4);
      }
      #result {
        margin-top: 20px;
        font-size: 14px;
        color: #ddd;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.4);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="assets/logo.jpeg" alt="Pramaan Logo" class="logo" />
      <div class="title-container">
        <h2>PRAMAAN</h2>
        <p class="subtitle">Ultimate Verifier</p>
      </div>
    </div>
    <div class="container">
      <label for="scan-type">Analysis Mode</label>
      <select id="scan-type">
          <option value="news">Detect Fake News</option>
          <option value="ai">Detect AI Generated Text</option>
          <option value="sms">Detect SMS Fraud</option>
          <option value="link">Detect Malicious Links</option>
          <option value="email">Detect Phishing Emails</option>
          <option value="chatbot">General Pramaan Explanation</option>
      </select>
      <label for="text-input">Target Content</label>
      <textarea id="text-input" placeholder="Paste text, SMS, or Link here to verify..."></textarea>
      <button id="analyze-btn">Scan Now</button>
      <div id="result"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
